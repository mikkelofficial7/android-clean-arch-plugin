<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Document icon -->
  <g transform="translate(70, 55)">
    <!-- Main document body -->
    <rect x="0" y="10" width="85" height="120" rx="4" fill="url(#doc)" stroke="#2C5AA0" stroke-width="2"/>

    <!-- Folded corner -->
    <path d="M 85 10 L 85 30 L 65 30 Z" fill="#C5D9E8" stroke="#2C5AA0" stroke-width="2"/>
    <path d="M 65 30 L 85 30 L 85 10" fill="none" stroke="#2C5AA0" stroke-width="2"/>

    <!-- Text lines -->
    <line x1="12" y1="45" x2="60" y2="45" stroke="#4A90E2" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="60" x2="73" y2="60" stroke="#4A90E2" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="75" x2="50" y2="75" stroke="#4A90E2" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="90" x2="70" y2="90" stroke="#66B3E6" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="102" x2="55" y2="102" stroke="#66B3E6" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="114" x2="65" y2="114" stroke="#66B3E6" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- AI Sparkle icon (top right) -->
  <g transform="translate(165, 65)">
    <!-- Star/sparkle effect -->
    <circle cx="0" cy="0" r="18" fill="#FFD700" opacity="0.9"/>
    <path d="M 0,-15 L 3,-3 L 15,0 L 3,3 L 0,15 L -3,3 L -15,0 L -3,-3 Z" fill="#FFFFFF" stroke="#FFA500" stroke-width="1"/>

    <!-- Small sparkles -->
    <circle cx="-8" cy="-8" r="3" fill="#FFD700"/>
    <circle cx="8" cy="8" r="3" fill="#FFD700"/>
  </g>

  <!-- Gear/settings icon (bottom right) -->
  <g transform="translate(170, 180) scale(0.6)">
    <circle cx="0" cy="0" r="15" fill="#FFFFFF" stroke="#2C5AA0" stroke-width="3"/>
    <circle cx="0" cy="0" r="7" fill="#4A90E2"/>
    <!-- Gear teeth -->
    <rect x="-3" y="-20" width="6" height="8" fill="#FFFFFF" stroke="#2C5AA0" stroke-width="2" rx="1"/>
    <rect x="-3" y="12" width="6" height="8" fill="#FFFFFF" stroke="#2C5AA0" stroke-width="2" rx="1"/>
    <rect x="-20" y="-3" width="8" height="6" fill="#FFFFFF" stroke="#2C5AA0" stroke-width="2" rx="1"/>
    <rect x="12" y="-3" width="8" height="6" fill="#FFFFFF" stroke="#2C5AA0" stroke-width="2" rx="1"/>
  </g>

  <!-- "DG" text badge (bottom left) -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="40" height="40" rx="20" fill="#FFFFFF" stroke="#2C5AA0" stroke-width="2"/>
    <text x="20" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4A90E2" text-anchor="middle">DG</text>
  </g>
</svg>